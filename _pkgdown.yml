url: https://infoelectoral.spainelectoralproject.com/

template:
  package: spainelectoraltheme
  bootstrap: 5

lang: en
navbar:
  structure:
    left:  [intro, reference, articles]
    right: [github, twitter, search]
  components:
    github:
      icon: fa-github
      href: https://github.com/rOpenSpain/infoelectoral
      aria-label: Github
    twitter:
      icon: fa-twitter
      href: http://twitter.com/hmeleiros
      aria-label: Twitter
repo:
  url:
    home: https://github.com/rOpenSpain/infoelectoral/
    issue: https://github.com/rOpenSpain/infoelectoral/issues/
    user: https://github.com/rOpenSpain/

home:
  links:
    - text: Report a bug
      href: https://github.com/rOpenSpain/infoelectoral/issues
  sidebar:
    structure: [links, license, authors, citation, dev]

reference:
- title: Functions
  desc:  Download, format and import electoral data to the enviroment.
- contents:
  - municipios
  - mesas
  - provincias
  - candidatos
- title: Datasets
  desc: Datasets with the official codes and names of the different administrative levels (autonomous communities, provinces and municipalities).
- contents:
  - fechas_elecciones
  - codigos_ccaa
  - codigos_provincias
  - codigos_municipios
  - codigos_partidos
  - renta

footer:
  structure:
    left: developed_by
    right: [license, built_with]
  components:
    license: >
      Licensed under <a href="https://www.gnu.org/licenses/old-licenses/gpl-2.0" target="_blank" rel="noopener">GPL-2</a>.

authors:
  Héctor Meleiro:
    href: "https://hmeleiro.com/"
